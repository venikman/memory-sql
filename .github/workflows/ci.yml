name: ci

on:
  push:
    branches: [main, js]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # no build or typecheck on this branch: plain ESM JS, node runs src directly
      - run: npm ci
      - run: npm run check
      - run: npm test
